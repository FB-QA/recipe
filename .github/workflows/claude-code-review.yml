name: Claude code review

# Reviews every pull request automatically, and again on each push to it.
#
# SETUP (once per repo — neither step can be done by an agent):
#   1. Install the Claude GitHub App on the repo.
#   2. Add the repo secret CLAUDE_CODE_OAUTH_TOKEN, minted with `claude setup-token`.
# Until both exist this workflow FAILS on every PR — a permanent red cross. Do the
# setup before the first PR, or delete this file.
#
# It runs on the Claude SUBSCRIPTION, not an API key: `claude_code_oauth_token` is
# a declared input of claude-code-action@v1 ("alternative to anthropic_api_key").
# The action's README doesn't mention it; action.yml does.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Only ever review the newest push on a branch. A burst of pushes would otherwise
# start a review per push, each spending tokens on a diff already stale.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip drafts. A draft is work in progress; paying to be told it is unfinished
    # is not a review, it is an echo.
    if: github.event.pull_request.draft == false
    permissions:
      contents: read # it comments; it does not commit
      pull-requests: write
      issues: write
      # Required. The action mints its GitHub App installation token by exchanging
      # an OIDC token; without this the runner never sets ACTIONS_ID_TOKEN_REQUEST_URL
      # and the action dies before it reads a single line of the diff.
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history: a review that cannot see the base is guessing

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          # Post a tracking comment. Without it, a run that reviews the diff and then
          # fails to publish looks identical to a run that had nothing to say — which
          # is exactly how the first one went unnoticed.
          track_progress: true
          # Setting `prompt` puts the action in AGENT mode, and agent mode grants NO
          # tools by default. On a runner there is nobody to approve a prompt, so every
          # ungranted call is denied. The tools below are what /code-review actually
          # reaches for: it fans out to subagents (Task), keeps the checklist (TodoWrite),
          # reads the tree, and then speaks (inline comments, gh pr comment).
          #
          # This job CANNOT push: `contents: read` above. Bash is bounded to git/gh,
          # and gh is bounded by what the App token is scoped to.
          #
          # --max-turns 40, not 15: /code-review is a multi-stage skill — gather, read,
          # review, then post. At 15 it hit the ceiling one step from posting its
          # findings and threw error_max_turns, having done the whole review. The
          # ceiling exists so a pathological diff cannot spiral; it has to sit above
          # the cost of a normal review, not below it.
          claude_args: >-
            --max-turns 40
            --allowedTools "Read,Grep,Glob,LS,Task,TodoWrite,mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment,Bash(git:*),Bash(gh:*)"
