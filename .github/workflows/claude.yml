name: Claude

# On-demand Claude: mention @claude in a PR comment, a review comment or an issue
# and it answers in thread. This is the "ask it a question / ask it to fix that"
# path — distinct from claude-code-review.yml, which reviews every PR unasked.
#
# SETUP (once per repo — neither step can be done by an agent):
#   1. Install the Claude GitHub App on the repo.
#   2. Add the repo secret CLAUDE_CODE_OAUTH_TOKEN, minted with `claude setup-token`.
#
# NOTE the wider blast radius: this one has `contents: write`, because "@claude fix
# that" means pushing a commit. The reviewer above only ever comments. If you want
# a repo where nothing automated can write to the code, delete this file and keep
# the reviewer.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only wake when actually summoned. Without this guard the job spins up a runner
    # for every comment on every issue and PR in the repo, and pays to discover it
    # had nothing to do.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write # it may be asked to push a fix
      pull-requests: write
      issues: write
      # Required — see claude-code-review.yml. OIDC is how the action gets its
      # GitHub App token; omit it and the action fails before doing any work.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 20"
